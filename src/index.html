<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rudera</title>
		<link rel="stylesheet" href="css/style.css" />
		<script src="https://accounts.google.com/gsi/client" async defer></script>
		<script>
			const CLIENT_ID =
				"";
			const SCOPES = "https://www.googleapis.com/auth/gmail.send";

			let accessToken = null;

			function initClient() {
				google.accounts.oauth2
					.initTokenClient({
						client_id: CLIENT_ID,
						scope: SCOPES,
						redirect_uri: window.location.origin,
						callback: (tokenResponse) => {
							accessToken = tokenResponse.access_token;
							sendEmail();
						},
					})
					.requestAccessToken();
			}

			function sendEmail() {
				const email = [
					"To: test@example.com",
					"Subject: Test Gmail API",
					"",
					"To jest testowa wiadomość.",
				].join("\n");

				const encodedEmail = btoa(unescape(encodeURIComponent(email)))
					.replace(/\+/g, "-")
					.replace(/=+$/, "");

				fetch(
					"https://gmail.googleapis.com/gmail/v1/users/me/messages/send",
					{
						method: "POST",
						headers: {
							Authorization: `Bearer ${accessToken}`,
							"Content-Type": "application/json",
						},
						body: JSON.stringify({
							raw: encodedEmail,
						}),
					},
				)
					.then((res) => res.json())
					.then((data) => console.log("Wysłano:", data))
					.catch((err) => console.error(err));
			}
		</script>
	</head>
	<body>
		<div id="map"></div>

		<div id="page-container">
			<div class="img-wrap">
				<img
					src="resources/panoraman.jpeg"
					alt="Italian Trulli"
					id="main-image"
				/>
			</div>
			<div id="auth-status"></div>
			<div id="navigation">
				<button id="login" class="navigation-button">Zaloguj</button>
				<button
					id="logout"
					class="navigation-button"
					style="display: none"
				>
					Wyloguj
				</button>
				<button
					id="myReservation"
					class="navigation-button"
					style="display: none"
				>
					Moja rezerwacja
				</button>
				<button id="foresterDescription" class="navigation-button">
					Opis leśniczówki
				</button>
				<button
					id="areaDescription"
					class="navigation-button"
					onclick="initClient()"
				>
					Gmail
				</button>
				<button id="booking" class="navigation-button">
					Zarezerwuj
				</button>
				<button id="contact" class="navigation-button">Kontakt</button>
				<div id="underline"></div>
			</div>
			<div id="subpage"></div>
			<div id="subpages">
				<div id="supbageBooking"></div>
			</div>
		</div>
		<script>
			((g) => {
				var h,
					a,
					k,
					p = "The Google Maps JavaScript API",
					c = "google",
					l = "importLibrary",
					q = "__ib__",
					m = document,
					b = window;
				b = b[c] || (b[c] = {});
				var d = b.maps || (b.maps = {}),
					r = new Set(),
					e = new URLSearchParams(),
					u = () =>
						h ||
						(h = new Promise(async (f, n) => {
							await (a = m.createElement("script"));
							e.set("libraries", [...r] + "");
							for (k in g)
								e.set(
									k.replace(
										/[A-Z]/g,
										(t) => "_" + t[0].toLowerCase(),
									),
									g[k],
								);
							e.set("callback", c + ".maps." + q);
							a.src =
								`https://maps.${c}apis.com/maps/api/js?` + e;
							d[q] = f;
							a.onerror = () =>
								(h = n(Error(p + " could not load.")));
							a.nonce =
								m.querySelector("script[nonce]")?.nonce || "";
							m.head.append(a);
						}));
				d[l]
					? console.warn(p + " only loads once. Ignoring:", g)
					: (d[l] = (f, ...n) =>
							r.add(f) && u().then(() => d[l](f, ...n)));
			})({ key: "", v: "weekly" });
		</script>
	</body>

	<script type="module" src="js/reservation.js"></script>
	<script type="module" src="js/index.js"></script>
</html>
