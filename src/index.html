<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rudera</title>
		<link rel="stylesheet" href="src/css/style.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
		<script src="https://accounts.google.com/gsi/client" async defer></script>
		<script>
			const CLIENT_ID =
				"302980156761-rkn7e1pdcnm5hp3k2bq5jqqftogqdo38.apps.googleusercontent.com";
			const SCOPES = "https://www.googleapis.com/auth/gmail.send";

			let accessToken = null;

			function initClient() {
				google.accounts.oauth2
					.initTokenClient({
						client_id: CLIENT_ID,
						scope: SCOPES,
						callback: (tokenResponse) => {
							accessToken = tokenResponse.access_token;
							sendEmail();
						},
					})
					.requestAccessToken();
			}

			function sendEmail() {
				const email = [
					"To: robczek@onet.pl",
					"Subject: Test Gmail API",
					"",
					"To jest testowa wiadomość.",
				].join("\n");

				const encodedEmail = btoa(unescape(encodeURIComponent(email)))
					.replace(/\+/g, "-")
					.replace(/=+$/, "");

				fetch(
					"https://gmail.googleapis.com/gmail/v1/users/me/messages/send",
					{
						method: "POST",
						headers: {
							Authorization: `Bearer ${accessToken}`,
							"Content-Type": "application/json",
						},
						body: JSON.stringify({
							raw: encodedEmail,
						}),
					},
				)
					.then((res) => res.json())
					.then((data) => console.log("Wysłano:", data))
					.catch((err) => console.error(err));
			}
		</script>
	</head>
	<body>
		<div id="map"></div>

		<div id="navbar">
			<div id="navbar-left">
				<div id="navbar-title">rudera.com</div>
				<div id="navigation">
					<button
						id="myReservation"
						class="navigation-button"
						style="display: none"
					>
						<i class="fas fa-calendar-check"></i>Moja rezerwacja
					</button>
					<button id="foresterDescription" class="navigation-button">
						<i class="fas fa-house"></i>Opis leśniczówki
					</button>
					<button
						id="areaDescription"
						class="navigation-button"
						onclick="initClient()"
					>
						<i class="fas fa-envelope"></i>Gmail
					</button>
					<button id="contact" class="navigation-button"><i class="fas fa-phone"></i>Kontakt</button>
					<div id="underline"></div>
				</div>
			</div>
			<div id="navbar-right">
				<button id="login" class="navigation-button"><i class="fas fa-right-to-bracket"></i>Zaloguj</button>
				<button
					id="logout"
					class="navigation-button"
					style="display: none"
				>
					<i class="fas fa-right-from-bracket"></i>Wyloguj
				</button>
				<span id="user-display" style="display: none;"></span>
			</div>
		</div>
		<div id="availability-bar">
			<input type="date" id="quickCheckIn" />
			<input type="date" id="quickCheckOut" />
			<input type="number" id="quickGuests" min="1" max="5" value="1" />
			<button id="checkAvailability">Sprawdź dostępność</button>
		</div>
		<div id="page-container">
			<div id="auth-status"></div>
			<div id="subpage"></div>
			<div id="subpages">
				<div id="supbageBooking"></div>
			</div>
		</div>
		<script>
			((g) => {
				var h,
					a,
					k,
					p = "The Google Maps JavaScript API",
					c = "google",
					l = "importLibrary",
					q = "__ib__",
					m = document,
					b = window;
				b = b[c] || (b[c] = {});
				var d = b.maps || (b.maps = {}),
					r = new Set(),
					e = new URLSearchParams(),
					u = () =>
						h ||
						(h = new Promise(async (f, n) => {
							await (a = m.createElement("script"));
							e.set("libraries", [...r] + "");
							for (k in g)
								e.set(
									k.replace(
										/[A-Z]/g,
										(t) => "_" + t[0].toLowerCase(),
									),
									g[k],
								);
							e.set("callback", c + ".maps." + q);
							a.src =
								`https://maps.${c}apis.com/maps/api/js?` + e;
							d[q] = f;
							a.onerror = () =>
								(h = n(Error(p + " could not load.")));
							a.nonce =
								m.querySelector("script[nonce]")?.nonce || "";
							m.head.append(a);
						}));
				d[l]
					? console.warn(p + " only loads once. Ignoring:", g)
					: (d[l] = (f, ...n) =>
							r.add(f) && u().then(() => d[l](f, ...n)));
			})({ key: "", v: "weekly" });
		</script>
	</body>

	<script type="module" src="src/js/reservation.js"></script>
	<script type="module" src="src/js/index.js"></script>
</html>
